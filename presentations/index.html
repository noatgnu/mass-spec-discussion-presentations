<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentations</title>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --gold: #c9a04d;
            --gold-dim: #8a7035;
            --text: #e0e0e0;
            --text-dim: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--gold-dim);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--gold);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .presentations-grid {
            display: grid;
            gap: 20px;
        }

        .presentation-card {
            background: var(--bg-secondary);
            border: 1px solid var(--gold-dim);
            border-radius: 4px;
            padding: 25px 30px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .presentation-card:hover {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(201, 160, 77, 0.15);
            transform: translateX(5px);
        }

        .presentation-info {
            flex: 1;
        }

        .presentation-title {
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--gold);
            margin-bottom: 5px;
        }

        .presentation-meta {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-family: monospace;
        }

        .presentation-arrow {
            color: var(--gold-dim);
            font-size: 1.5rem;
            transition: transform 0.2s ease;
        }

        .presentation-card:hover .presentation-arrow {
            transform: translateX(5px);
            color: var(--gold);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid var(--gold-dim);
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        footer a {
            color: var(--gold);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Presentations</h1>
            <p class="subtitle">Select a presentation to view</p>
        </header>

        <div class="presentations-grid">
            
            <a href="./multi-section-example/" class="presentation-card">
                <div class="presentation-info">
                    <div class="presentation-title">Mass Spectrometry Fundamentals</div>
                    <div class="presentation-meta">multi-section-example</div>
                </div>
                <span class="presentation-arrow">→</span>
            </a>

            <a href="./markdown-example/" class="presentation-card">
                <div class="presentation-info">
                    <div class="presentation-title">Markdown Presentation</div>
                    <div class="presentation-meta">markdown-example</div>
                </div>
                <span class="presentation-arrow">→</span>
            </a>

            <a href="./example-presentation/" class="presentation-card">
                <div class="presentation-info">
                    <div class="presentation-title">Intro to Mass Spec</div>
                    <div class="presentation-meta">example-presentation</div>
                </div>
                <span class="presentation-arrow">→</span>
            </a>

            <a href="./2026-02-19/" class="presentation-card">
                <div class="presentation-info">
                    <div class="presentation-title">Lab Meeting - 2026-03-09</div>
                    <div class="presentation-meta">2026-02-19 · DUNDEE / MRC-PPU</div>
                </div>
                <span class="presentation-arrow">→</span>
            </a>
        </div>

        <footer>
            Built with <a href="https://revealjs.com" target="_blank">Reveal.js</a>
        </footer>
    </div>
</body>
</html>
